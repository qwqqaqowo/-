<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>在线留言板 - 登录</title>
  <style>
    .login-box {width: 300px; margin: 100px auto; text-align: center;}
    .input-item {margin: 10px 0;}
    input {width: 200px; padding: 8px;}
    button {padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px;}
  </style>
</head>
<body>
<div class="login-box">
  <h2>在线留言板</h2>
  <form action="/user/login" method="post">
    <div class="input-item">
      <input type="text" name="username" placeholder="请输入账号" required>
    </div>
    <div class="input-item">
      <input type="password" name="password" placeholder="请输入密码" required>
    </div>
    <button type="submit">登录</button>
  </form>
  <p><a href="/user/register">还没有账号？点击注册</a></p>
</div>
</body>
</html>
