<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>留言列表 - 在线留言板</title>
  <style>
    .header {text-align: center; margin: 20px 0;}
    .post-item {width: 600px; margin: 20px auto; padding: 15px; border: 1px solid #eee; border-radius: 8px;}
    .post-title {color: #007bff; text-decoration: none; font-size: 18px;}
    .post-content {margin: 10px 0; color: #333;}
    .post-time {color: #999; font-size: 12px;}
    .btn {padding: 8px 15px; text-decoration: none; color: white; border-radius: 4px;}
    .btn-add {background: #007bff;}
    .btn-logout {background: #dc3545; float: right;}
  </style>
</head>
<body>
<div class="header">
  <h1>在线留言板</h1>
  <a href="/post/add" class="btn btn-add">发布新留言</a>
  <a href="/user/logout" class="btn btn-logout">退出登录</a>
</div>
<div class="post-list">
  <div th:each="post : ${posts}">
    <div class="post-item">
      <a th:href="@{/post/detail/{id}(id=${post.id})}" class="post-title" th:text="${post.title}"></a>
      <p class="post-content" th:text="${post.content}"></p>
      <p class="post-time" th:text="${#dates.format(post.createTime, 'yyyy-MM-dd HH:mm')}"></p>
    </div>
  </div>
</div>
</body>
</html>
