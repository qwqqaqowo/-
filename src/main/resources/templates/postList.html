<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>з•ҷиЁҖеҲ—иЎЁ - еңЁзәҝз•ҷиЁҖжқҝ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>еңЁзәҝз•ҷиЁҖжқҝ</h1>
    <div class="btn-group">
      <a href="/post/add" class="btn btn-add">еҸ‘еёғж–°з•ҷиЁҖ</a>
      <a href="/user/logout" class="btn btn-logout">йҖҖеҮәзҷ»еҪ•</a>
    </div>
  </div>

  <div class="search-box">
    <form action="/post/list" method="get">
      <input type="text" name="keyword" placeholder="иҜ·иҫ“е…Ҙж Үйўҳжҗңзҙў" th:value="${keyword}">
      <button type="submit" class="search-btn">жҗңзҙў</button>
    </form>
  </div>

  <div class="post-list">
    <div class="post-item" th:each="post : ${posts}">
      <div class="post-title">
        <a th:href="@{/post/detail/{id}(id=${post.id})}" th:text="${post.title}"></a>

        <a th:if="${session.user != null && (session.user.role == 'admin' || session.user.id == post.userId)}"
           th:href="@{/post/delete/{id}(id=${post.id})}"
           class="delete-btn"
           onclick="return confirm('зЎ®е®ҡеҲ йҷӨпјҹ')">
          еҲ йҷӨ
        </a>
      </div>

      <div class="post-content" th:text="${post.content}"></div>
      <div class="post-time">
        дҪңиҖ…пјҡ[[${post.nickname}]] вҖў [[${#dates.format(post.createTime, 'yyyy-MM-dd HH:mm')}]]
      </div>
    </div>
  </div>


  <div class="page-box">
    <a th:href="@{/post/list(pageNum=1,keyword=${keyword})}">йҰ–йЎө</a>
    <a th:href="@{/post/list(pageNum=${pageNum-1},keyword=${keyword})}">дёҠдёҖйЎө</a>

    <span class="page-info" th:text="${pageNum}+'/'+${pages}"></span>

    <a th:href="@{/post/list(pageNum=${pageNum+1},keyword=${keyword})}">дёӢдёҖйЎө</a>
    <a th:href="@{/post/list(pageNum=${pages},keyword=${keyword})}">е°ҫйЎө</a>
  </div>
</div>

</body>
</html>
