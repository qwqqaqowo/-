<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>留言详情 - 在线留言板</title>
  <style>
    .detail-box {width: 600px; margin: 50px auto;}
    .post-info {padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px;}
    .comment-box {margin: 20px 0;}
    .comment-item {padding: 10px; border-bottom: 1px dashed #eee; margin: 10px 0;}
    textarea {width: 500px; height: 100px; padding: 8px; resize: none;}
    button {padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px;}
    .back {text-decoration: none; color: #007bff;}
  </style>
</head>
<body>
<div class="detail-box">
  <a href="/post/list" class="back">← 返回留言列表</a>
  <div class="post-info">
    <h2 th:text="${post.title}"></h2>
    <p th:text="${post.content}"></p>
    <p th:text="${#dates.format(post.createTime, 'yyyy-MM-dd HH:mm')}"></p>
  </div>

  <div class="comment-box">
    <h3>评论区</h3>
    <form action="/comment/add" method="post">
      <input type="hidden" name="postId" th:value="${post.id}">
      <textarea name="content" placeholder="请输入评论内容" required></textarea>
      <br>
      <button type="submit">发表评论</button>
    </form>

    <div th:each="comment : ${comments}">
      <div class="comment-item">
        <p th:text="${comment.content}"></p>
        <p th:text="${#dates.format(comment.createTime, 'yyyy-MM-dd HH:mm')}"></p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
