<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>留言详情 - 在线留言板</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <a href="/post/list" class="back-btn">← 返回留言列表</a>

  <div class="post-item">
    <div class="post-title">
      [[${post.title}]]
    </div>

    <div class="post-content" th:text="${post.content}"></div>

    <div class="post-time">
      作者：[[${post.nickname}]] • [[${#dates.format(post.createTime, 'yyyy-MM-dd HH:mm')}]]
    </div>
  </div>

  <div class="comment-box">
    <h3>评论区</h3>
    <form action="/comment/add" method="post">
      <input type="hidden" name="postId" th:value="${post.id}">
      <textarea name="content" placeholder="写下你的评论..." required></textarea>
      <button type="submit" class="comment-btn">发表评论</button>
    </form>

    <div class="comment-list">
      <div class="comment-item" th:each="c : ${comments}">
        <p th:text="${c.content}"></p>
        <div class="post-time">
          评论者：[[${c.nickname}]] • [[${#dates.format(c.createTime, 'yyyy-MM-dd HH:mm')}]]
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
