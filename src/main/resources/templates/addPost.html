<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>发布留言 - 在线留言板</title>
  <style>
    .add-box {width: 600px; margin: 50px auto;}
    .input-item {margin: 10px 0;}
    input[type="text"] {width: 500px; padding: 8px;}
    textarea {width: 500px; height: 200px; padding: 8px; resize: none;}
    button {padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px;}
  </style>
</head>
<body>
<div class="add-box">
  <h2>发布新留言</h2>
  <form action="/post/add" method="post">
    <div class="input-item">
      <input type="text" name="title" placeholder="请输入留言标题" required>
    </div>
    <div class="input-item">
      <textarea name="content" placeholder="请输入留言内容" required></textarea>
    </div>
    <button type="submit">发布</button>
  </form>
</div>
</body>
</html>
